# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library that can be
# installed by adding `alembic[tz]` to the pip requirements
# string value is passed to dateutil.tz.gettz()
# or leave blank for UTC
timezone =

# version number format; valid values are "utc" (the default),
# "epoch" for unix timestamps, or an integer incrementing sequence
version_number_format = utc

# the maximum length of the auto-generated "slug" in a migration filename;
# defaults to 40.  Set to zero to disable slug generation entirely.
truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
revision_environment = false

# set to 'true' to output the buffer of a 'stamp' operation.
output_buffer = true

# set to 'true' to add .pyc files to .gitignore when generating new
# migrations.
exclude_pycs = true

# other options
sqlalchemy.url = postgresql+psycopg2://myproj:myproj@localhost:5432/myproj


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated migration scripts. These get invoked after
# the script is written but before the rewrite step.
#
# The format is:
#
# hook = exec:<script>
# hook = console:<python_function>
#
# The 'console' style hook can also specify a callable in the form
# module:function; this is loaded directly from Python's sys.path.
#
# The 'exec' style hook takes arguments as a space-separated list.
# The 'console' style hook takes arguments as keyword arguments to
# the callable.
#
# Each hook can also specify 'working_dir' which is the directory
# where the command is run.
#
# An example:
#
# [post_write_hooks]
# hooks = black
#
# [hook_black]
# type = console_scripts
# entry = black
# options = -l 79
# working_dir = .


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
