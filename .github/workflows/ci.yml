name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          make install-python
          make install-e3

      - name: Install Node dependencies
        run: npm ci

      - name: Lint Python
        run: |
          make lint-python
          make lint-platform

      - name: Lint Web
        run: make lint-web

      - name: Test Python
        run: |
          make test-python
          make test-e3

      - name: Typecheck Web
        run: make typecheck-web

      - name: Test Web
        run: make test-web
