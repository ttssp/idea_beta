version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: myproj-postgres
    environment:
      POSTGRES_USER: myproj
      POSTGRES_PASSWORD: myproj
      POSTGRES_DB: myproj
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myproj"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
